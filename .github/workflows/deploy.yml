name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build plugin
        run: npm run build

      - name: Build demo wiki as single HTML
        run: |
          node -e "
          const tw = require('tiddlywiki').TiddlyWiki();
          tw.boot.argv = [
            'wiki',
            '--load', 'dist/\$__plugins_itw_tw-excalidraw.json',
            '--rendertiddler', '\$:/core/save/all', 'index.html', 'text/plain'
          ];
          tw.boot.boot();
          "
          mkdir -p pages
          cp wiki/output/index.html pages/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
