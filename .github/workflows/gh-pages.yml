name: Deploy Tiddlywiki To Github Pages

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'

jobs:
  deploy:
    permissions:
      contents: write
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'
          run_install: true

      - name: Build plugin
        run: npm run build

      - name: Build demo wiki as single HTML
        run: |
          node -e "
          const tw = require('tiddlywiki').TiddlyWiki();
          tw.boot.argv = [
            'wiki',
            '--load', 'dist/\$__plugins_itw_tw-excalidraw.json',
            '--rendertiddler', '\$:/core/save/all', 'index.html', 'text/plain'
          ];
          tw.boot.boot();
          "
          mkdir -p pages
          cp wiki/output/index.html pages/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
